{% extends "base.html" %}

{% block title %}Prüfpunkt bearbeiten{% endblock %}

{% block content %}

<div class="box">
    <h2>Prüfpunkt bearbeiten</h2>

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <p>
            <label>Sortierung:</label><br>
            <input type="number" name="sortierung" value="{{ punkt['sortierung'] }}">
        </p>

        <p>
            <label>Prüfpunkt:</label><br>
            <input type="text" name="pruefpunkt" value="{{ punkt['pruefpunkt'] }}" required>
        </p>

        <p>
            <label>Hinweis:</label><br>
            <textarea name="hinweis" rows="3">{{ punkt["hinweis"] }}</textarea>
        </p>

        <p>
            <label>Pflichtfeld:</label><br>
            <select name="pflichtfeld">
                <option value="1" {% if punkt["pflichtfeld"] %}selected{% endif %}>Ja</option>
                <option value="0" {% if not punkt["pflichtfeld"] %}selected{% endif %}>Nein</option>
            </select>
        </p>

        <p>
            <button type="submit">Speichern</button>
            <a href="{{ url_for('pruefschema_detail', id=punkt['schema_id']) }}">Abbrechen</a>
        </p>
    </form>
</div>

{% endblock %}
