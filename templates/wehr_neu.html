{% extends "base.html" %}

{% block title %}Neue Wehr{% endblock %}

{% block content %}

<div class="box">
    <h2>Neue Wehr anlegen</h2>

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <p>
            <label>Name:</label><br>
            <input type="text" name="name" placeholder="z. B. Feuerwehr Musterort" required>
        </p>

        <p>
            <label>Kürzel:</label><br>
            <input type="text" name="kuerzel" placeholder="z. B. musterort" required>
        </p>

        <p>
            <label>Aktiv:</label><br>
            <select name="aktiv">
                <option value="1" selected>Ja</option>
                <option value="0">Nein</option>
            </select>
        </p>

        <p>
            <button type="submit">Wehr anlegen</button>
            <a href="{{ url_for('wehren_liste') }}">Abbrechen</a>
        </p>
    </form>
</div>

{% endblock %}
