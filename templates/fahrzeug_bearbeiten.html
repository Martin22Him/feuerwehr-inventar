{% extends "base.html" %}

{% block title %}Fahrzeug bearbeiten{% endblock %}

{% block content %}

<div class="box">
    <h2>Fahrzeug bearbeiten</h2>
    <p><strong>{{ fahrzeug["name"] }}</strong></p>
</div>

<div class="box">
    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <p>
            <label>Fahrzeugname:</label><br>
            <input type="text" name="name" value="{{ fahrzeug['name'] or '' }}" required>
        </p>

        <p>
            <label>Schlüssel / URL-Kürzel:</label><br>
            <input type="text" name="schluessel" value="{{ fahrzeug['schluessel'] or '' }}" required>
        </p>

        <p>
            <label>Typ:</label><br>
            <select name="typ">
                <option value="fahrzeug" {% if fahrzeug["typ"] == "fahrzeug" %}selected{% endif %}>Fahrzeug</option>
                <option value="anhaenger" {% if fahrzeug["typ"] == "anhaenger" %}selected{% endif %}>Anhänger</option>
                <option value="lager" {% if fahrzeug["typ"] == "lager" %}selected{% endif %}>Lager/Bereich</option>
                <option value="schlauch" {% if fahrzeug["typ"] == "schlauch" %}selected{% endif %}>Schlauchbestand</option>
            </select>
        </p>

        <p>
            <label>Kennzeichen:</label><br>
            <input type="text" name="kennzeichen" value="{{ fahrzeug['kennzeichen'] or '' }}">
        </p>

        <p>
            <label>TÜV-Termin:</label><br>
            <input type="text" name="tuev_termin" value="{{ fahrzeug['tuev_termin'] or '' }}" placeholder="YYYY-MM-DD">
        </p>

        <p>
            <label>SP-Termin:</label><br>
            <input type="text" name="sp_termin" value="{{ fahrzeug['sp_termin'] or '' }}" placeholder="YYYY-MM-DD">
        </p>

        <p>
            <label>Schlauchwechsel:</label><br>
            <input type="text" name="schlauchwechsel" value="{{ fahrzeug['schlauchwechsel'] or '' }}" placeholder="YYYY-MM-DD">
        </p>

        <p>
            <label>Aktiv:</label><br>
            <select name="aktiv">
                <option value="1" {% if fahrzeug["aktiv"] %}selected{% endif %}>Ja</option>
                <option value="0" {% if not fahrzeug["aktiv"] %}selected{% endif %}>Nein</option>
            </select>
        </p>

        <p>
            <button type="submit">Speichern</button>
            <a href="{{ url_for('fahrzeuge_verwalten') }}">Abbrechen</a>
        </p>
    </form>
</div>

{% endblock %}
