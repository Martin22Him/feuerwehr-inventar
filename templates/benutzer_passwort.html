{% extends "base.html" %}

{% block title %}Passwort setzen{% endblock %}

{% block content %}

<div class="box">
    <h2>Passwort neu setzen</h2>

    <p>
        Benutzer: <strong>{{ benutzer["username"] }}</strong>
    </p>

    <form method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <p>
            <label>Neues Passwort:</label><br>
            <input type="password" name="password" required>
            <input type="password" name="password_wiederholen" required>
        </p>

        <p>
            <button type="submit">Passwort speichern</button>
            <a href="{{ url_for('benutzer_liste') }}">Abbrechen</a>
        </p>
    </form>
</div>

{% endblock %}
