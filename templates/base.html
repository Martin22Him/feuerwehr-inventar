<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        /* HEADER */
        .header {
            background-color: #4a73b8;
            color: white;
            text-align: center;
            padding: 20px;
            font-size: 32px;
        }

        /* LAYOUT */
        .layout {
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 220px;
            background-color: #5a7fc2;
            padding: 15px;
            min-height: 100vh;
        }

        .nav-button {
            display: block;
            background: #ddd;
            margin-bottom: 10px;
            padding: 10px;
            text-decoration: none;
            color: black;
            border-radius: 4px;
        }

        .nav-button:hover {
            background: #ccc;
        }

        .submenu {
            margin-left: 15px;
        }

        /* CONTENT */
        .content {
            flex: 1;
            padding: 25px;
        }

        .box {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="header">
    Feuerwehr Jesewitz
</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <a href="/" class="nav-button">Startseite</a>
        <a href="/geraete" class="nav-button">Gerätschaften</a>
        <a href="/geraete?kategorie=Atemschutz" class="nav-button">Atemschutz</a>

        <div class="nav-button">Fahrzeuge</div>
        <div class="submenu">
            <a href="/fahrzeug/tlf" class="nav-button">TLF</a>
            <a href="/fahrzeug/lf" class="nav-button">LF</a>
            <a href="/fahrzeug/schlauchanhaenger" class="nav-button">Schlauchanhänger</a>
            <a href="/fahrzeug/ts" class="nav-button">TS-Anhänger</a>
            <a href="/fahrzeug/boot" class="nav-button">Boot-Anhänger</a>
        </div>

        <a href="/prueftermine" class="nav-button">Prüftermine</a>
        <a href="/kleidung" class="nav-button">Kleidung</a>
        <a href="/geraete?fahrzeug=Lager" class="nav-button">Lager</a>

    </div>

    <!-- CONTENT -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
